# =============================================================================
# Kenya Beach Guide — Docker Compose
# =============================================================================
# Services:
#   db       — TimescaleDB (PostgreSQL + time-series)
#   backend  — FastAPI application
#   frontend — Vue 3 dashboard served via nginx
#
# Usage:
#   docker compose up --build -d
#   docker compose down
#   docker compose logs -f backend
# =============================================================================

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: beach-guide-db
    environment:
      POSTGRES_USER: beach
      POSTGRES_PASSWORD: beach
      POSTGRES_DB: beach_guide
    ports:
      - '5433:5432'
    volumes:
      - beach_data:/var/lib/postgresql/data
      - ./backend/src/data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U beach -d beach_guide']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beach-guide-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://beach:beach@db:5432/beach_guide
      IOC_API_BASE_URL: https://ioc-sealevelmonitoring.org/service.php
      OPEN_METEO_MARINE_URL: https://marine-api.open-meteo.com/v1/marine
      OPEN_METEO_FORECAST_URL: https://api.open-meteo.com/v1/forecast
      CORS_ORIGINS: http://localhost:3001,http://localhost:5174
      MODEL_DIR: /app/models
      LOG_LEVEL: INFO
      INGEST_INTERVAL_MINUTES: 10
      WEATHER_INTERVAL_MINUTES: 30
      FORECAST_INTERVAL_MINUTES: 360
    ports:
      - '8200:8200'
    volumes:
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8200/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beach-guide-frontend
    ports:
      - '3001:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  beach_data:
